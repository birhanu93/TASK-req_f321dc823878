services:
  app:
    image: node:20-alpine
    container_name: alignspace-app
    working_dir: /app
    volumes:
      - ./:/app:ro
    command: npx --yes serve -l 8080 -s .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alignspace-tests
    volumes:
      - ./tests:/app/tests:ro
      - ./js:/app/js:ro
      - ./data:/app/data:ro
    command: npm test
    environment:
      - NODE_ENV=test
      - CI=true
